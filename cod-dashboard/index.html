<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COD Command Center</title>
  <link rel="stylesheet" href="css/theme.css">
  <script>
    // Redirect to the appropriate page.
    // Supports legacy ?page=X URLs from the old SPA.
    const params = new URLSearchParams(window.location.search);
    const page = params.get('page') || 'war-room';
    params.delete('page');
    const qs = params.toString();
    window.location.replace('pages/' + page + '.html' + (qs ? '?' + qs : ''));
  </script>
</head>
<body>
  <p style="font-family:sans-serif;color:#94a3b8;text-align:center;margin-top:40vh">Redirecting...</p>
</body>
</html>
